<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px, solid gray;
            padding: 8px;
        }

        .destaque {
            background-color: chartreuse;        
        }

        col.cnome {
            background-color: chartreuse;        
        }

        .amarelo {
            background-color: yellow;
        }

        .vermelho {
            background-color: red;
        }
    </style>

</head>
<body>
    <h1>Exercício de Tabela</h1>

    <table>
        <colgroup>
            <col class="amarelo">
            <col class="vermelho" span="2">
            <col class="amarelo">
    
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>

        <tr>
            <td>João Pedro</td>
            <td>M</td>
            <td>30</td>
            <td>Engenheiro</td>
        </tr>

        <tr>
            <td>Carla Souza</td>
            <td>F</td>
            <td>22</td>
            <td>Estudante</td>
        </tr>

        <tr>
            <td>Marcos Silva</td>
            <td>M</td>
            <td>41</td>
            <td>Médico</td>
        </tr>

        <tr>
            <td>Fernanda Lima</td>
            <td>F</td>
            <td>28</td>
            <td>Designer</td>
        </tr>

        <tr>
            <td>Lucas Almeida</td>
            <td>M</td>
            <td>35</td>
            <td>Programador</td>
        </tr>

    </table>
</body>
</html>
